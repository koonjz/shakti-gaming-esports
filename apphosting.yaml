# Firebase App Hosting Configuration
# See: https://firebase.google.com/docs/app-hosting/configure

# Settings for runtime resource allocation
runConfig:
  cpu: 1
  memoryMiB: 1024
  minInstances: 0
  maxInstances: 10

# Environment variables exposed to the Next.js SSR build and runtime
env:
  # Public Client Configs
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: "mock-api-key"
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: "mock-project.firebaseapp.com"
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: "mock-project"
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: "mock-project.appspot.com"
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "123456789012"
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: "1:123456789012:web:abcdef1234567890"

  # Server-Only Riot API Key referenced from Secret Manager
  - variable: RIOT_API_KEY
    secret: riot_api_key_secret
